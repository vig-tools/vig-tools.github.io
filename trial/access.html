<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIG Expert — Trial Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f0f5f1; font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      background: #fff; border-radius: 18px;
      box-shadow: 0 8px 40px rgba(31,77,58,0.13);
      padding: 52px 44px; width: 400px; max-width: 94vw; text-align: center;
    }
    .brand-name {
      font-size: 1.3rem; font-weight: 800; color: #1f4d3a;
      letter-spacing: 0.07em; text-transform: uppercase;
      font-family: "Franklin Gothic Medium","Arial Narrow",Arial,sans-serif;
      margin-bottom: 3px;
    }
    .brand-tag {
      font-size: 0.68rem; color: #7fa88c; letter-spacing: 0.11em;
      text-transform: uppercase; margin-bottom: 36px;
    }
    h1 { font-size: 1.2rem; font-weight: 700; color: #1f4d3a; margin-bottom: 10px; }
    .desc { font-size: 0.875rem; color: #44524a; line-height: 1.65; margin-bottom: 30px; }
    .field {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid #c8d8cc; border-radius: 9px;
      font-size: 1rem; color: #22302a; background: #f7fbf7;
      outline: none; margin-bottom: 14px;
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: border-color 0.15s; text-align: center;
    }
    .field:focus { border-color: #2f6b52; background: #fff; }
    .btn {
      width: 100%; padding: 14px; background: #1f4d3a; color: #fff;
      border: none; border-radius: 9px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s; letter-spacing: 0.03em;
    }
    .btn:hover:not(:disabled) { background: #2f6b52; }
    .btn:disabled { background: #c8d8cc; cursor: default; }
    .error-box {
      background: #fef0f0; border: 1px solid #f5c6c6;
      border-radius: 8px; padding: 11px 14px; color: #a00;
      font-size: 0.85rem; margin-bottom: 16px; display: none; text-align: left;
    }
    .error-box.show { display: block; }
    .footer-note { margin-top: 28px; font-size: 0.75rem; color: #7fa88c; }
    .footer-note a { color: #2f6b52; text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-name">VIG Expert</div>
    <div class="brand-tag">Vacuum Insulated Glass &middot; Technical Trial</div>
    <h1>VIG Expert — Trial Access</h1>
    <p class="desc">Enter your trial access token to continue.<br>
    If you don&rsquo;t have a token, please contact us to request one.</p>
    <div class="error-box" id="errBox"></div>
    <input class="field" id="tokenField" type="text"
           placeholder="e.g. TRIAL-2026-ALPHA"
           autocomplete="off" autocapitalize="characters" spellcheck="false"/>
    <button class="btn" id="submitBtn" onclick="doSubmit()">Access Trial</button>
    <div class="footer-note">
      Need a token? <a href="mailto:info@vigexpert.com">Contact us</a>
    </div>
  </div>

  <script>
    /* ── CONFIG ── Point this at your API Gateway trial-auth endpoint ── */
    var AUTH_API = "https://3ulwio3s4h.execute-api.us-east-1.amazonaws.com/prod/trial-auth";
    var SESSION_KEY = "vigTrialKey";

    /* If already has valid session, skip straight to agent */
    (function() {
      var sk = sessionStorage.getItem(SESSION_KEY);
      if (sk) {
        /* Verify it is still valid */
        fetch(AUTH_API + "?action=check", {
          headers: { "X-Session-Key": sk }
        }).then(function(r) { return r.json(); })
          .then(function(d) { if (d.ok) window.location.href = "glass-expert.html"; })
          .catch(function() {});
      }
    })();

    document.getElementById("tokenField").addEventListener("keydown", function(e) {
      if (e.key === "Enter") doSubmit();
    });

    function showError(msg) {
      var b = document.getElementById("errBox");
      b.textContent = msg; b.classList.add("show");
    }

    function doSubmit() {
      var token = document.getElementById("tokenField").value.trim().toUpperCase();
      if (!token) { showError("Please enter your access token."); return; }

      var btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerHTML = "<span class='spinner'></span>Verifying&hellip;";
      document.getElementById("errBox").classList.remove("show");

      fetch(AUTH_API + "?action=validate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: token })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) {
          sessionStorage.setItem(SESSION_KEY, d.sessionKey);
          sessionStorage.setItem(SESSION_KEY + "_expires", d.expires);
          window.location.href = "glass-expert.html";
        } else {
          var msgs = {
            expired:       "This trial token has expired. Please contact us to arrange access.",
            invalid_token: "Invalid token. Please check and try again.",
            missing_token: "Please enter your access token.",
          };
          showError(msgs[d.reason] || "Access denied. Please contact us to arrange access.");
          btn.disabled = false;
          btn.textContent = "Access Trial";
        }
      })
      .catch(function() {
        showError("Connection error. Please try again.");
        btn.disabled = false;
        btn.textContent = "Access Trial";
      });
    }
  </script>
</body>
</html>
